{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Soporte Técnico</title>
    <!-- Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Enlace a tu CSS externo -->
    <link rel="stylesheet" href="{% static 'web_ujap/css/contacto.css' %}">
</head>
<body>

    <!-- Navbar sincronizado con AURA -->
    <nav>
        <div class="nav-inner">
            <a href="{% url 'home' %}" class="nav-brand">
                A U R A <span>ASISTENCIA</span>
            </a>
            
            <div class="nav-tabs">
                <a href="{% url 'home' %}" class="nav-tab">INICIO</a>
                <!-- Marcamos SOPORTE como activa -->
                <div class="nav-tab active">SOPORTE</div>
                
                <form action="{% url 'logout' %}" method="post" class="logout-form">
                    {% csrf_token %}
                    <button type="submit" class="logout-btn">
                        <i class="fa-solid fa-power-off"></i> SALIR
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Contenedor del Formulario -->
    <main class="container">
        <div class="aura-card">
            <div class="card-header">
                <i class="fa-solid fa-envelope-open-text"></i>
                <h2>Ticket de Soporte</h2>
            </div>
            
            <p class="card-subtitle">Reporta fallas técnicas o solicita asistencia con la plataforma.</p>

            <form action="" method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" name="nombre" value="Kleiver Torrealba" required>
                </div>
                
                <div class="form-group">
                    <label>Correo Institucional</label>
                    <input type="email" name="email" value="Example@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label>Tipo de Usuario</label>
                    <div class="select-wrapper">
                        <select name="tipo_usuario" required>
                            <option value="estudiante">Estudiante</option>
                            <option value="profesor">Profesor</option>
                            <option value="admin">Administrativo</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Descripción del Problema</label>
                    <textarea name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                </div>
                
                <button type="submit" class="si-btn">
                    ENVIAR REPORTE <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </main>

</body>
</html>
