{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Registro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'web_ujap/css/crear_usuario.css' %}">
</head>
<body>

    <a href="{% url 'login' %}" class="btn-volver">← Volver</a>

    <div class="container">

        <div class="brand">
            <h1>A U R A</h1>
            <span>ASISTENCIA</span>
        </div>

        <div class="card">
            <form method="POST">
                {% csrf_token %}

                <div class="field-group">
    <label>USUARIO</label>
    <div class="input-wrapper">
        <i class="fa-solid fa-user icon-left"></i>
        <input type="text" name="username" placeholder="Ej: kleiver123" required>
    </div>
</div>

                <div class="field-group">
                    <label>CÉDULA</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-id-card icon-left"></i>
                        <input type="text" name="cedula" placeholder="V-00.000.000" required>
                    </div>
                </div>

                <div class="field-group">
                    <label>FACULTAD</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-building-columns icon-left"></i>
                        <select name="facultad" required>
                            <option value="">Seleccionar...</option>
                            <option value="ingenieria">Facultad de Ingeniería</option>
                            <option value="medicina">Facultad de Medicina</option>
                            <option value="derecho">Facultad de Derecho</option>
                            <option value="ciencias">Facultad de Ciencias</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label>CORREO</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope icon-left"></i>
                        <input type="email" name="email" placeholder="example@gmail.com" required>
                    </div>
                </div>

                <div class="field-group">
                    <label>CONTRASEÑA</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••••" required>
                        <i class="fa-regular fa-eye icon-right" id="togglePassword" style="cursor:pointer;"></i>
                    </div>
                </div>

                <div class="field-group">
                    <label>CONFIRMAR CONTRASEÑA</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <input type="password" id="password2" name="password2" placeholder="••••••••••" required>
                        <i class="fa-regular fa-eye icon-right" id="togglePassword2" style="cursor:pointer;"></i>
                    </div>
                </div>

                {% if error %}
                    <p class="error-msg">{{ error }}</p>
                {% endif %}

                <button type="submit" class="btn-submit">CREAR CUENTA</button>

            </form>

            <div class="divider">
                <span class="line"></span>
                <span class="text">OR</span>
                <span class="line"></span>
            </div>

            <div class="auth-links">
                <a href="{% url 'login' %}" class="link-center">¿Ya tienes cuenta? Inicia sesión</a>
            </div>
        </div>

        <p class="footer-text">Protected by advanced encryption</p>
    </div>

    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
        document.getElementById('togglePassword2').addEventListener('click', function() {
            const input = document.getElementById('password2');
            input.type = input.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>

</body>
</html>
