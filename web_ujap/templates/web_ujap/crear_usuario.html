<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - UJAP.online</title>
    <link rel="stylesheet" href="{% static 'web_ujap/css/crear_usuario.css' %}">
    <link rel="icon" href="{% static 'web_ujap/css/img/logo.ico' %}" type="image/x-icon">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'login' %}" class="nav-logo">UJAP<span class="logo-red">.online</span></a>

<input type="checkbox" id="menu-toggle" class="menu-checkbox">
        <label for="menu-toggle" class="menu-icon">&#9776;</label>

            <ul class="nav-links">
                <li><a href="{% url 'login' %}">Inicio</a></li>
                <li><a href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://ujap.edu.ve/facultades/&ved=2ahUKEwj5gZCBqeaTAxVh6ckDHVZNHFUQFnoECAsQAQ&usg=AOvVaw1k6UA0BosQSIZKMXeF-FGr">Facultades</a></li>
                <li><a href="https://aulavirtual.ujap.edu.ve/">Aula Virtual</a></li>
                <li><a href="{% url 'contacto' %}" class="nav-btn">Contacto</a></li>
            </ul>
        </div>
    </nav>

{% if messages %}
    <div class="messages-container">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}



    <form action="{% url 'usuario' %}" method="POST">
        {% csrf_token %}
        <h2>Crear Usuario</h2>
        
        <fieldset>
            <legend>Datos Académicos</legend>
            <div class="form_input">
                <label for="cedula">Cédula de Identidad</label>
                <input type="text" id="cedula" name="cedula" placeholder="V-00.000.000" required>
            </div>

            <div class="form_input">
                <label for="facultad">Facultad</label>
                <select id="facultad" name="facultad">
                    <option value="ingenieria">Facultad de Ingeniería</option>
                    <option value="salud">Facultad de Ciencias de la Salud</option>
                    <option value="sociales">Facultad de Cs. Sociales y Económicas</option>
                    <option value="derecho">Facultad de Ciencias Jurídicas y Políticas</option>
                    <option value="educacion">Facultad de ciencias de la Educación</option>
                </select>
            </div>
        </fieldset>

        <fieldset>
            <legend>Seguridad</legend>
            <div class="form_input">
                <label for="email">Correo</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
            </div>

            <div class="form_input">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <div class="form_input">
                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" name="confirm_password" placeholder="********" required>
            </div>
        </fieldset>

        <div class="form_input">
            <button type="submit" class="btn-submit">Registrarme</button>
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <a href="{% url 'login' %}">¿Ya tienes cuenta? Inicia sesión aquí</a>
        </div>
        

<form ...>

    </form>
</body>
</html>
