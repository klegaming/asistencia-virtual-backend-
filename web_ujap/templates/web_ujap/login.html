{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Asistencia</title>
    
    <!-- Enlace a tu nuevo archivo CSS -->
    <link rel="stylesheet" href="{% static 'web_ujap/css/login.css' %}">
    
    <!-- Font Awesome para los iconos del usuario, candado y el ojo -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Botón de Volver (Arriba a la derecha) -->
    <div class="top-bar">
        <!-- Reemplaza 'home' con el nombre real de tu ruta principal si es distinto -->
        <a href="{% url 'home' %}" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Volver
        </a>
    </div>

    <div class="login-container">
        
        <!-- Encabezado AURA -->
        <div class="brand-header">
            <h1 class="brand-title">A U R A</h1>
            <p class="brand-subtitle">ASISTENCIA</p>
        </div>

        <!-- Caja del Formulario -->
        <div class="login-box">
            <!-- Es vital el method="POST" para que funcione con Django -->
            <form method="POST" action="">
                {% csrf_token %}
                
                <!-- Campo: usuario -->
                <div class="input-group">
                    <label for="usuario">USUARIO</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user icon-left"></i>
                        <input type="text" id="usuario" name="usuario" placeholder="introduzca su usuario" required>
                    </div>
                </div>

                <!-- Campo: Password -->
                <div class="input-group">
                    <label for="password">PASSWORD</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <i class="fa-regular fa-eye icon-right" id="togglePassword" style="cursor: pointer;"></i>
                    </div>
                </div>

                <!-- Checkbox: Remember me -->
                <div class="remember-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <!-- Botón Sign In -->
                <button type="submit" class="btn-signin">SIGN IN</button>
            </form>

            <!-- Divisor OR -->
            <div class="divider">
                <span class="line"></span>
                <span class="text">OR</span>
                <span class="line"></span>
            </div>

            <!-- Enlaces inferiores -->
            <div class="auth-links">
                <!-- Puedes cambiar el '#' por las rutas reales luego, ej: {% url 'usuario' %} -->
                <a href="{% url 'usuario' %}" class="link-left">Create account</a>
                <a href="{% url 'recuperar' %}" class="link-right">Forgot password?</a>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-text">
            Protected by advanced encryption
        </div>
        
    </div>

    <!-- Pequeño script opcional para que el "ojo" de la contraseña funcione -->
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            // Cambia el tipo de input de password a texto
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            // Cambia el icono
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
