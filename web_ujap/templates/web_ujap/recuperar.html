<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - UJAP.online</title>
    <link rel="stylesheet" href="{% static 'web_ujap/css/recuperar.css' %}">
    <link rel="icon" href="{% static 'web_ujap/css/img/logo.ico' %}" type="image/x-icon">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'login' %}" class="nav-logo">UJAP<span class="logo-red">.online</span></a>

<input type="checkbox" id="menu-toggle" class="menu-checkbox">
        <label for="menu-toggle" class="menu-icon">&#9776;</label>

            <ul class="nav-links">
                <li><a href="{% url 'login' %}">Inicio</a></li>
                <li><a href="https://www.google.com/url?sa=t&source=web&rct=j&opi=89978449&url=https://ujap.edu.ve/facultades/&ved=2ahUKEwj5gZCBqeaTAxVh6ckDHVZNHFUQFnoECAsQAQ&usg=AOvVaw1k6UA0BosQSIZKMXeF-FGr">Facultades</a></li>
                <li><a href="https://aulavirtual.ujap.edu.ve/">Aula Virtual</a></li>
                <li><a href="{% url 'contacto' %}" class="nav-btn">Contacto</a></li>
            </ul>
        </div>
    </nav>

    <form action="{% url 'recuperar' %}" method="POST">
        {% csrf_token %}
        <h2>Recuperar Contraseña</h2>
        
        <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 20px;">
            Introduce tu correo  y te enviaremos las instrucciones para restablecer tu clave.
        </p>

        <fieldset>
            <legend>Verificación</legend>
            <div class="form_input">
                <label for="email">Correo</label>
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
            </div>
        </fieldset>

        <div class="form_input">
            <button type="submit" class="btn-submit">Enviar Instrucciones</button>
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <a href="../login/login.html">Volver al inicio de sesión</a>
        </div>
    </form>
</body>
</html>
