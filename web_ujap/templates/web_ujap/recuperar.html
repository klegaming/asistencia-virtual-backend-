{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Recuperar Contraseña</title>
    
    <!-- Usamos el MISMO CSS del login -->
    <link rel="stylesheet" href="{% static 'web_ujap/css/login.css' %}">
    
    <!-- Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="top-bar">
        <a href="{% url 'login' %}" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Volver al Login
        </a>
    </div>

    <div class="login-container">
        
        <div class="brand-header">
            <h1 class="brand-title">A U R A</h1>
            <p class="brand-subtitle">RECUPERAR CONTRASEÑA</p>
        </div>

        <div class="login-box">
            <p style="color: #8a8a93; font-size: 0.85rem; text-align: center; margin-bottom: 25px;">
                Introduce tu correo y te enviaremos las instrucciones para restablecer tu clave.
            </p>

            <form method="POST">
                {% csrf_token %}
                
                <div class="input-group">
                    <label for="email">CORREO ELECTRÓNICO</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope icon-left"></i>
                        <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                    </div>
                </div>

                <button type="submit" class="btn-signin">ENVIAR INSTRUCCIONES</button>
            </form>

            <div class="divider">
                <span class="line"></span>
                <span class="text">O</span>
                <span class="line"></span>
            </div>

            <div class="auth-links" style="justify-content: center;">
                <a href="{% url 'login' %}">¿Recordaste tu clave? Inicia sesión</a>
            </div>
        </div>

        <div class="footer-text">
            Protected by advanced encryption
        </div>
        
    </div>
</body>
</html>
