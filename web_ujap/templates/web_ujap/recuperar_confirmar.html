{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Nueva Contraseña</title>
    
    <!-- Usamos el mismo CSS maestro de AURA -->
    <link rel="stylesheet" href="{% static 'web_ujap/css/login.css' %}">
    
    <!-- Font Awesome para los iconos de candado y ojo -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        
        <div class="brand-header">
            <h1 class="brand-title">A U R A</h1>
            <p class="brand-subtitle">RESTABLECER CLAVE</p>
        </div>

        <div class="login-box">
            <h2 style="color: #ffffff; font-size: 1.4rem; font-weight: 500; margin-bottom: 10px; text-align: center;">
                Nueva contraseña
            </h2>
            <p style="color: #8a8a93; font-size: 0.85rem; text-align: center; margin-bottom: 25px;">
                Elegí una contraseña segura de al menos 8 caracteres.
            </p>

            <!-- Bloque de Mensajes de Error (Django Messages) -->
            {% if messages %}
                {% for message in messages %}
                    <div style="background: rgba(239, 68, 68, 0.1); color: #f87171; padding: 12px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); margin-bottom: 20px; font-size: 0.85rem; text-align: center;">
                        <i class="fa-solid fa-triangle-exclamation" style="margin-right: 5px;"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form action="{% url 'recuperar_confirmar' token %}" method="POST">
                {% csrf_token %}
                
                <!-- Campo: Nueva Contraseña -->
                <div class="input-group">
                    <label for="password">NUEVA CONTRASEÑA</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
                        <i class="fa-regular fa-eye icon-right toggle-pass" style="cursor: pointer;"></i>
                    </div>
                </div>

                <!-- Campo: Confirmar Contraseña -->
                <div class="input-group">
                    <label for="confirm_password">CONFIRMAR CONTRASEÑA</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-halved icon-left"></i>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repetí tu contraseña" required>
                    </div>
                </div>

                <button type="submit" class="btn-signin">GUARDAR CONTRASEÑA</button>
            </form>
        </div>

        <div class="footer-text">
            Protected by advanced encryption
        </div>
        
    </div>

    <!-- Script para ver/ocultar contraseña -->
    <script>
        document.querySelectorAll('.toggle-pass').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                if (input.type === "password") {
                    input.type = "text";
                    this.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = "password";
                    this.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });
    </script>
</body>
</html>
