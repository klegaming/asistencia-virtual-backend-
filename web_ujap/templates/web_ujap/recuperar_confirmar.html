<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña - UJAP.online</title>
  <link rel="stylesheet" href="{% static 'web_ujap/css/recuperar.css' %}">
  <link rel="icon" href="{% static 'web_ujap/css/img/logo.ico' %}" type="image/x-icon">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="{% url 'login' %}" class="nav-logo">UJAP<span class="logo-red">.online</span></a>
    </div>
  </nav>

  <form action="{% url 'recuperar_confirmar' token %}" method="POST">
    {% csrf_token %}
    <h2>Nueva contraseña</h2>
    <p style="text-align:center;color:#666;font-size:14px;margin-bottom:20px">
      Elegí una contraseña segura de al menos 8 caracteres.
    </p>

    {% if messages %}
      {% for message in messages %}
        <div style="background:#ffe0e0;color:#c0392b;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:14px">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <fieldset>
      <legend>Nueva contraseña</legend>
      <div class="form_input">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
      </div>
      <div class="form_input">
        <label for="confirm_password">Confirmar contraseña</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repetí tu contraseña" required>
      </div>
    </fieldset>

    <div class="form_input">
      <button type="submit" class="btn-submit">Guardar contraseña</button>
    </div>
  </form>
</body>
</html>
