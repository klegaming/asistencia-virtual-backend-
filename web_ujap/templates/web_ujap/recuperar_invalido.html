<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enlace inválido - UJAP.online</title>
  <link rel="stylesheet" href="{% static 'web_ujap/css/recuperar.css' %}">
  <link rel="icon" href="{% static 'web_ujap/css/img/logo.ico' %}" type="image/x-icon">
  <style>
    .msg-box{max-width:420px;margin:60px auto;text-align:center;padding:40px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
    .msg-box .icon{font-size:52px;margin-bottom:16px}
    .msg-box h2{color:#c0392b;margin-bottom:10px}
    .msg-box p{color:#666;font-size:14px;line-height:1.7}
    .msg-box a{display:inline-block;margin-top:20px;padding:12px 28px;background:#e63946;color:#fff;border-radius:8px;font-weight:700;text-decoration:none;font-size:14px}
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="{% url 'login' %}" class="nav-logo">UJAP<span class="logo-red">.online</span></a>
    </div>
  </nav>
  <div class="msg-box">
    <div class="icon">⚠️</div>
    <h2>Enlace inválido o expirado</h2>
    <p>Este enlace ya fue utilizado o expiró. Los enlaces son válidos por <strong>1 hora</strong>.</p>
    <a href="{% url 'recuperar' %}">Solicitar nuevo enlace</a>
  </div>
</body>
</html>
